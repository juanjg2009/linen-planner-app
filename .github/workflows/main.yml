name: Build macOS app (.dmg)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install && npm run build:planner
      - working-directory: desktop
        run: npm install && npm run dist:mac
      - uses: actions/upload-artifact@v4
        with:
          name: linen-planner-macos
          path: desktop/dist/*.dmg
          if-no-files-found: error
